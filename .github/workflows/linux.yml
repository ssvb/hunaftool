name: linux
on: [push, pull_request]

jobs:
  test:
    name: tests
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Ruby and Crystal
        run: |
          sudo apt-get update && sudo apt-get install ruby crystal -y

      - name: Run tests
        run: |
          crystal --version
          crystal build --release hunaftool.rb
          ./hunaftool
          ruby hunaftool.rb

      - name: Run tests with old Crystal
        run: |
          wget https://github.com/crystal-lang/crystal/releases/download/1.6.0/crystal-1.6.0-1-linux-x86_64-bundled.tar.gz
          tar -xzf crystal-1.6.0-1-linux-x86_64-bundled.tar.gz
          crystal-1.6.0-1/bin/crystal --version
          pwd
          LD_LIBRARY_PATH=./crystal-1.6.0-1/lib/crystal/lib  crystal-1.6.0-1/bin/crystal build --release hunaftool.rb
          ./hunaftool
