name: windows-tests
on: [push, pull_request]

jobs:
  test:
    name: tests
    strategy:
      matrix:
        os: [windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Install MSYS with Ruby and Crystal on Windows
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-crystal mingw-w64-ucrt-x86_64-ruby

      - name: Run tests
        run: |
          mingw-w64-ucrt-x86_64-crystal --version
          mingw-w64-ucrt-x86_64-crystal build --release hunaftool.rb -o hunaftool.exe
          ./hunaftool.exe
          mingw-w64-ucrt-x86_64-ruby hunaftool.rb
